<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>REGISTRASI ANGGOTA KOMUNITAS</title>

<link
href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#06152d;
color:white;
padding:20px;
}

.container{
max-width:950px;
margin:auto;
background:#0d2347;
border-radius:24px;
overflow:hidden;
box-shadow:0 0 40px rgba(0,0,0,.45);
}

.banner{
width:100%;
height:300px;
background:
linear-gradient(rgba(0,0,0,.45),rgba(0,0,0,.45)),
url('https://images.unsplash.com/photo-1552674605-db6ffd4facb5?q=80&w=1600');
background-size:cover;
background-position:center;
position:relative;
}

.banner-content{
position:absolute;
left:30px;
bottom:30px;
}

.banner-content h1{
font-size:50px;
font-weight:800;
line-height:1;
color:#f6c453;
}

.banner-content p{
margin-top:10px;
font-size:18px;
}

.form-section{
padding:30px;
}

.community-box{
background:#132f5e;
padding:22px;
border-radius:18px;
margin-bottom:25px;
line-height:1.9;
}

.slot{
color:#f6c453;
font-weight:700;
}

.section-title{
color:#f6c453;
font-size:25px;
margin-bottom:25px;
border-left:5px solid #f6c453;
padding-left:12px;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
}

.input-group{
display:flex;
flex-direction:column;
}

.input-group label{
margin-bottom:8px;
font-weight:600;
}

.input-group input,
.input-group select,
.input-group textarea{
padding:14px;
border:none;
border-radius:14px;
background:#132f5e;
color:white;
font-size:15px;
outline:none;
}

.input-group textarea{
resize:none;
}

.input-group input::placeholder,
.input-group textarea::placeholder{
color:#ccc;
}

.full{
grid-column:1/3;
}

button{
width:100%;
padding:16px;
border:none;
border-radius:14px;
background:#f6c453;
color:#06152d;
font-size:18px;
font-weight:800;
cursor:pointer;
transition:.25s;
}

button:hover{
transform:translateY(-2px);
}

.loading{
display:none;
margin-top:20px;
text-align:center;
color:#f6c453;
font-weight:600;
}

.success{
display:none;
margin-top:30px;
background:#10391e;
padding:25px;
border-radius:18px;
}

.success h2{
font-size:34px;
margin-bottom:20px;
}

@media(max-width:768px){

body{
padding:14px;
}

.banner{
height:230px;
}

.banner-content{
left:20px;
bottom:20px;
}

.banner-content h1{
font-size:34px;
}

.banner-content p{
font-size:15px;
}

.form-section{
padding:20px;
}

.grid{
grid-template-columns:1fr;
}

.full{
grid-column:auto;
}

}

</style>

</head>

<body>

<div class="container">

<div class="banner">

<div class="banner-content">

<h1>RUN FOR YOUR LIFE 2026</h1>

<p>
REGISTRASI ANGGOTA KOMUNITAS
</p>

</div>

</div>

<div class="form-section">

<div class="community-box" id="communityInfo">

⏳ Memuat data komunitas...

</div>

<h2 class="section-title">
FORM PESERTA KOMUNITAS
</h2>

<form id="registerForm">

<div class="grid">

<!-- NAMA -->
<div class="input-group">
<label>Nama Lengkap</label>
<input
type="text"
name="namaLengkap"
required>
</div>

<!-- NIK -->
<div class="input-group">
<label>NIK</label>
<input
type="text"
name="nik"
id="nik"
maxlength="16"
pattern="[0-9]{16}"
placeholder="16 digit NIK"
required>
</div>

<!-- NAMA BIB -->
<div class="input-group">
<label>Nama BIB</label>
<input
type="text"
name="namaBib"
required>
</div>

<!-- TGL -->
<div class="input-group">
<label>Tanggal Lahir</label>
<input
type="date"
name="tanggalLahir"
id="tanggalLahir"
required>
</div>

<!-- JK -->
<div class="input-group">
<label>Jenis Kelamin</label>

<select
name="jenisKelamin"
required>

<option value="">Pilih</option>
<option value="Laki-laki">Laki-laki</option>
<option value="Perempuan">Perempuan</option>

</select>

</div>

<!-- WA -->
<div class="input-group">
<label>Nomor WhatsApp</label>

<input
type="text"
name="wa"
placeholder="08xxxxxxxxxx"
required>

</div>

<!-- EMAIL -->
<div class="input-group">
<label>Email</label>

<input
type="email"
name="email"
required>

</div>

<!-- KOTA -->
<div class="input-group">
<label>Kota Asal</label>

<input
type="text"
name="kota"
required>

</div>

<!-- JERSEY -->
<div class="input-group">
<label>Ukuran Jersey</label>

<select
name="jersey"
required>

<option value="">Pilih</option>
<option>XS</option>
<option>S</option>
<option>M</option>
<option>L</option>
<option>XL</option>
<option>XXL</option>

</select>

</div>

<!-- GOLDAR -->
<div class="input-group">
<label>Golongan Darah</label>

<select name="goldar">

<option value="">Pilih</option>
<option>A</option>
<option>B</option>
<option>AB</option>
<option>O</option>

</select>

</div>

<!-- KONTAK -->
<div class="input-group">
<label>Kontak Darurat</label>

<input
type="text"
name="kontakDarurat"
placeholder="08xxxxxxxxxx"
required>

</div>

<!-- RIWAYAT -->
<div class="input-group full">
<label>Riwayat Penyakit</label>

<textarea
rows="4"
name="riwayat"></textarea>

</div>

<!-- BUTTON -->
<div class="full">

<button
type="submit"
id="submitBtn">

DAFTAR SEKARANG

</button>

</div>

</div>

</form>

<div
class="loading"
id="loading">

⏳ Sedang mengirim data...

</div>

<div
class="success"
id="successBox">

<h2>
✅ REGISTRASI BERHASIL
</h2>

<div id="successText"></div>

</div>

</div>

</div>

<script>

// ======================================
// WEB APP URL
// ======================================

const WEBAPP_URL =
"https://script.google.com/macros/s/AKfycbzOHIHdm8Ot3K_ZWxU82Wt0oz5sdr4WtR2dgEsDJG36ladh_kWuvBssTCVNlvkWV9q9/exec";

// ======================================
// URL PARAM
// ======================================

const params =
new URLSearchParams(window.location.search);

const kodeKomunitas =
params.get("kode");

// ======================================
// ELEMENT
// ======================================

const communityInfo =
document.getElementById("communityInfo");

const submitBtn =
document.getElementById("submitBtn");

const loading =
document.getElementById("loading");

const successBox =
document.getElementById("successBox");

const successText =
document.getElementById("successText");

const form =
document.getElementById("registerForm");

const nikInput =
document.getElementById("nik");

const tanggalLahirInput =
document.getElementById("tanggalLahir");

// ======================================
// DATA KOMUNITAS
// ======================================

let komunitasData = null;

// ======================================
// LOAD KOMUNITAS
// ======================================

async function loadKomunitas(){

try{

if(!kodeKomunitas){

communityInfo.innerHTML =
"❌ Kode komunitas tidak ditemukan";

submitBtn.disabled = true;

return;

}

const response =
await fetch(
`${WEBAPP_URL}?action=check&kode=${kodeKomunitas}`
);

const res =
await response.json();

if(res.status === "success"){

komunitasData = res;

const sisa =
res.totalSlot - res.totalTerdaftar;

if(sisa <= 0){

communityInfo.innerHTML =
"🚫 Kuota komunitas sudah penuh";

submitBtn.disabled = true;

return;

}

communityInfo.innerHTML = `

🏃 <b>Komunitas :</b><br>
${res.namaKomunitas}<br><br>

🎟 <b>Kategori :</b><br>
${res.kategori}<br><br>

👥 <b>Total Slot :</b><br>
${res.totalSlot}<br><br>

✅ <b>Sudah Terdaftar :</b><br>
${res.totalTerdaftar}<br><br>

🔥 <span class="slot">
Sisa Slot :
${sisa}
</span>

`;

}else{

communityInfo.innerHTML =
"❌ Kode komunitas tidak valid";

submitBtn.disabled = true;

}

}catch(err){

console.log(err);

communityInfo.innerHTML =
"❌ Gagal memuat data komunitas";

submitBtn.disabled = true;

}

}

loadKomunitas();

// ======================================
// AUTO TANGGAL LAHIR DARI NIK
// ======================================

nikInput.addEventListener(
"input",
function(){

const nik = this.value;

if(nik.length === 16){

let tanggal =
parseInt(nik.substring(6,8));

let bulan =
parseInt(nik.substring(8,10));

let tahun =
parseInt(nik.substring(10,12));

if(tanggal > 40){
tanggal -= 40;
}

const tahunNow =
new Date().getFullYear() % 100;

if(tahun <= tahunNow){

tahun = 2000 + tahun;

}else{

tahun = 1900 + tahun;

}

tanggalLahirInput.value =
`${tahun}-${String(bulan).padStart(2,"0")}-${String(tanggal).padStart(2,"0")}`;

}

}
);

// ======================================
// SUBMIT FORM
// ======================================

form.addEventListener(
"submit",
async function(e){

e.preventDefault();

// ======================================
// GET VALUE
// ======================================

const namaLengkap =
form.elements["namaLengkap"].value;

const nik =
form.elements["nik"].value;

const namaBib =
form.elements["namaBib"].value;

const jenisKelamin =
form.elements["jenisKelamin"].value;

const tanggalLahir =
form.elements["tanggalLahir"].value;

const wa =
form.elements["wa"].value;

const email =
form.elements["email"].value;

const kota =
form.elements["kota"].value;

const jersey =
form.elements["jersey"].value;

const goldar =
form.elements["goldar"].value;

const riwayat =
form.elements["riwayat"].value;

const kontakDarurat =
form.elements["kontakDarurat"].value;

// ======================================
// LOADING
// ======================================

loading.style.display = "block";

submitBtn.disabled = true;

submitBtn.innerText =
"SEDANG MENGIRIM...";

// ======================================
// DATA
// ======================================

const data = {

type : "anggota",

kodeKomunitas :
kodeKomunitas,

namaPeserta :
namaLengkap,

nik :
nik,

namaBib :
namaBib,

gender :
jenisKelamin,

tanggalLahir :
tanggalLahir,

noWhatsapp :
wa,

email :
email,

kota :
kota,

ukuranJersey :
jersey,

goldar :
goldar,

riwayat :
riwayat,

emergencyName :
"Kontak Darurat",

emergencyPhone :
kontakDarurat

};

// ======================================
// FETCH
// ======================================

try{

const response =
await fetch(
WEBAPP_URL,
{
method:"POST",

headers:{
"Content-Type":"text/plain;charset=utf-8"
},

body:JSON.stringify(data)

}
);

const res =
await response.json();

loading.style.display =
"none";

submitBtn.disabled = false;

submitBtn.innerText =
"DAFTAR SEKARANG";

// ======================================
// SUCCESS
// ======================================

if(res.status === "success"){

successBox.style.display =
"block";

// ======================================
// NOMOR WA
// ======================================

const nomorPeserta =
wa
.replace(/\D/g,"")
.replace(/^0/,"62");

// ======================================
// PESAN WA
// ======================================

const pesertaMessage =
encodeURIComponent(

`🏃 RUN FOR YOUR LIFE 2026

HALLO ${namaLengkap},

Registrasi Anda BERHASIL ✅

━━━━━━━━━━━━━━━

👥 Komunitas
${komunitasData.namaKomunitas}

🎟 Kategori
${komunitasData.kategori}

🆔 Register ID
${res.registerId}

🏷 No BIB
${res.bib}

🎽 Nama BIB
${namaBib}

━━━━━━━━━━━━━━━

📌 STATUS
SUDAH TERDAFTAR & LUNAS

━━━━━━━━━━━━━━━

🔎 CEK STATUS PESERTA
https://run4yourlife.github.io/cekstatus-peserta/

━━━━━━━━━━━━━━━

🔥 Sampai jumpa di garis start
RUN FOR YOUR LIFE 2026

Terimakasih.`

);

// ======================================
// LINK WA
// ======================================

const pesertaWaLink =
`https://wa.me/${nomorPeserta}?text=${pesertaMessage}`;

// ======================================
// SUCCESS HTML
// ======================================

successText.innerHTML = `

<div style="
background:#0b1f3d;
padding:22px;
border-radius:18px;
line-height:1.9;
">

🏃 HALLO, SELAMAT<br><br>

<b>${namaLengkap}</b><br><br>

REGISTRASI ANDA BERHASIL ✅

<br><br>

👥 <b>Komunitas :</b><br>
${komunitasData.namaKomunitas}

<br><br>

🎟 <b>Kategori :</b><br>
${komunitasData.kategori}

<br><br>

🆔 <b>Register ID :</b><br>
${res.registerId}

<br><br>

🏷 <b>No BIB :</b><br>
${res.bib}

<br><br>

🎽 <b>Nama BIB :</b><br>
${namaBib}

<br><br>

<a
href="${pesertaWaLink}"
target="_blank"
style="
display:block;
width:100%;
padding:16px;
text-align:center;
border-radius:14px;
background:linear-gradient(135deg,#00c853,#00e676);
color:white;
font-weight:800;
text-decoration:none;
">

📲 KIRIM DATA SAYA KE WHATSAPP

</a>

</div>

`;

form.reset();

window.scrollTo({
top:document.body.scrollHeight,
behavior:"smooth"
});

loadKomunitas();

}else{

alert(
res.message || "Registrasi gagal"
);

}

}catch(err){

loading.style.display =
"none";

submitBtn.disabled = false;

submitBtn.innerText =
"DAFTAR SEKARANG";

alert(
"Gagal mengirim data"
);

console.log(err);

}

}
);

</script>

</body>
</html>
