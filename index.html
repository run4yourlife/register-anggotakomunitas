<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>REGISTRASI ANGGOTA KOMUNITAS</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#06152d;
color:white;
padding:20px;
}

.container{
max-width:950px;
margin:auto;
background:#0d2347;
border-radius:24px;
overflow:hidden;
box-shadow:0 0 40px rgba(0,0,0,0.5);
}

.banner{
width:100%;
height:320px;
background:
linear-gradient(rgba(0,0,0,0.45),rgba(0,0,0,0.45)),
url('https://images.unsplash.com/photo-1552674605-db6ffd4facb5?q=80&w=1600');
background-size:cover;
background-position:center;
position:relative;
}

.banner-content{
position:absolute;
bottom:30px;
left:30px;
}

.banner-content h1{
font-size:52px;
color:#f6c453;
line-height:1;
font-weight:700;
}

.banner-content p{
margin-top:10px;
font-size:18px;
}

.form-section{
padding:30px;
}

.info-box{
background:#132f5e;
padding:22px;
border-radius:18px;
margin-bottom:30px;
line-height:1.9;
}

.section-title{
color:#f6c453;
margin-bottom:25px;
font-size:25px;
border-left:5px solid #f6c453;
padding-left:12px;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
}

.input-group{
display:flex;
flex-direction:column;
}

.input-group label{
margin-bottom:8px;
font-weight:500;
}

.input-group input,
.input-group select,
.input-group textarea{
padding:14px;
border:none;
border-radius:14px;
background:#132f5e;
color:white;
font-size:15px;
}

.input-group textarea{
resize:none;
}

.input-group input::placeholder,
.input-group textarea::placeholder{
color:#ccc;
}

.full{
grid-column:1/3;
}

button{
width:100%;
padding:16px;
border:none;
border-radius:14px;
background:#f6c453;
color:#06152d;
font-size:18px;
font-weight:700;
cursor:pointer;
transition:0.3s;
}

button:hover{
transform:scale(1.02);
}

.success{
display:none;
margin-top:30px;
background:#10391e;
padding:25px;
border-radius:16px;
line-height:1.8;
}

.loading{
display:none;
margin-top:20px;
text-align:center;
color:#f6c453;
font-size:16px;
}

.hidden{
display:none !important;
}

.community-box{
background:#132f5e;
padding:22px;
border-radius:18px;
margin-bottom:25px;
line-height:1.9;
}

.slot{
color:#f6c453;
font-weight:700;
}

@media(max-width:768px){

.grid{
grid-template-columns:1fr;
}

.full{
grid-column:auto;
}

.banner{
height:240px;
}

.banner-content h1{
font-size:34px;
}

}

</style>

</head>

<body>

<div class="container">

<div class="banner">

<div class="banner-content">
<h1>RUN FOR YOUR LIFE 2026</h1>
<p>REGISTRASI ANGGOTA KOMUNITAS</p>
</div>

</div>

<div class="form-section">

<div class="community-box" id="communityInfo">

⏳ Memuat data komunitas...

</div>

<h2 class="section-title">
FORM PESERTA KOMUNITAS
</h2>

<form id="registerForm">

<div class="grid">

<!-- NAMA -->
<div class="input-group">
<label>Nama Lengkap</label>
<input type="text" name="namaLengkap" required>
</div>

<!-- NIK -->
<div class="input-group">

<label>NIK</label>

<input
type="text"
name="nik"
id="nik"
maxlength="16"
pattern="[0-9]{16}"
placeholder="16 digit NIK"
required>

</div>

<!-- NAMA BIB -->
<div class="input-group">
<label>Nama BIB</label>
<input type="text" name="namaBib" required>
</div>

<!-- TGL -->
<div class="input-group">

<label>Tanggal Lahir</label>

<input
type="date"
name="tanggalLahir"
id="tanggalLahir"
required>

</div>

<!-- JK -->
<div class="input-group">

<label>Jenis Kelamin</label>

<select name="jenisKelamin" required>

<option value="">Pilih</option>
<option value="Laki-laki">Laki-laki</option>
<option value="Perempuan">Perempuan</option>

</select>

</div>

<!-- WA -->
<div class="input-group">

<label>Nomor WhatsApp</label>

<input
type="text"
name="wa"
placeholder="08xxxxxxxxxx"
required>

</div>

<!-- EMAIL -->
<div class="input-group">
<label>Email</label>
<input type="email" name="email" required>
</div>

<!-- KOTA -->
<div class="input-group">
<label>Kota Asal</label>
<input type="text" name="kota" required>
</div>

<!-- JERSEY -->
<div class="input-group">

<label>Ukuran Jersey</label>

<select name="jersey" required>

<option value="">Pilih</option>
<option value="XS">XS</option>
<option value="S">S</option>
<option value="M">M</option>
<option value="L">L</option>
<option value="XL">XL</option>
<option value="XXL">XXL</option>

</select>

</div>

<!-- GOLDAR -->
<div class="input-group">

<label>Golongan Darah</label>

<select name="goldar">

<option value="">Pilih</option>
<option>A</option>
<option>B</option>
<option>AB</option>
<option>O</option>

</select>

</div>

<!-- KONTAK -->
<div class="input-group">

<label>Kontak Darurat</label>

<input
type="text"
name="kontakDarurat"
placeholder="08xxxxxxxxxx"
required>

</div>

<!-- RIWAYAT -->
<div class="input-group full">

<label>Riwayat Penyakit</label>

<textarea
rows="4"
name="riwayat"></textarea>

</div>

<!-- BUTTON -->
<div class="full">

<button type="submit" id="submitBtn">
DAFTAR SEKARANG
</button>

</div>

</div>

</form>

<div class="loading" id="loading">
⏳ Sedang mengirim data...
</div>

<div class="success" id="successBox">

<h2>
✅ REGISTRASI BERHASIL
</h2>

<p id="successText"></p>

</div>

</div>

</div>

<script>

// ======================================
// URL WEB APP
// ======================================

const WEBAPP_URL =
"https://script.google.com/macros/s/AKfycbwr5NReGwYtYWt7hvx4Kw_LwAEZ2d0hVj3WGUPxfYzDXfFO8tno8w-PBO026at7ZNAcaw/exec";

// ======================================
// URL PARAM
// ======================================

const params =
new URLSearchParams(window.location.search);

const kodeKomunitas =
params.get("kode");

// ======================================
// ELEMENT
// ======================================

const communityInfo =
document.getElementById("communityInfo");

const submitBtn =
document.getElementById("submitBtn");

const nikInput =
document.getElementById("nik");

const tanggalLahirInput =
document.getElementById("tanggalLahir");

// ======================================
// DATA COMMUNITY
// ======================================

let komunitasData = null;

// ======================================
// LOAD DATA KOMUNITAS
// ======================================

async function loadKomunitas(){

try{

const response =
await fetch(
`${WEBAPP_URL}?action=getKomunitas&kode=${kodeKomunitas}`
);

const res =
await response.json();

if(res.status === "success"){

komunitasData = res.data;

// ======================================
// SLOT
// ======================================

const sisa =
res.data.jumlahPeserta -
res.data.jumlahTerdaftar;

// ======================================
// FULL
// ======================================

if(sisa <= 0){

communityInfo.innerHTML = `
🚫 KUOTA KOMUNITAS SUDAH PENUH
`;

submitBtn.disabled = true;

submitBtn.innerText =
"KUOTA PENUH";

return;

}

// ======================================
// SHOW
// ======================================

communityInfo.innerHTML = `

🏃 <b>Komunitas :</b>
${res.data.namaKomunitas}<br>

🎟 <b>Kategori :</b>
${res.data.kategori}<br>

👥 <b>Jumlah Slot :</b>
${res.data.jumlahPeserta}<br>

✅ <b>Sudah Terdaftar :</b>
${res.data.jumlahTerdaftar}<br>

🔥 <span class="slot">
Sisa Slot :
${sisa}
</span>

`;

}else{

communityInfo.innerHTML =
"❌ Kode komunitas tidak ditemukan";

submitBtn.disabled = true;

}

}catch(err){

console.log(err);

communityInfo.innerHTML =
"❌ Gagal memuat data komunitas";

}

}

loadKomunitas();

// ======================================
// AUTO TANGGAL LAHIR
// ======================================

nikInput.addEventListener("input", function(){

const nik = this.value;

if(nik.length === 16){

let tanggal =
parseInt(nik.substring(6,8));

let bulan =
parseInt(nik.substring(8,10));

let tahun =
parseInt(nik.substring(10,12));

if(tanggal > 40){
tanggal -= 40;
}

const tahunSekarang =
new Date().getFullYear() % 100;

if(tahun <= tahunSekarang){
tahun = 2000 + tahun;
}else{
tahun = 1900 + tahun;
}

const formatTanggal =
`${tahun}-${String(bulan).padStart(2,"0")}-${String(tanggal).padStart(2,"0")}`;

tanggalLahirInput.value =
formatTanggal;

}

});

// ======================================
// SUBMIT
// ======================================

document
.getElementById("registerForm")
.addEventListener("submit", async function(e){

e.preventDefault();

document.getElementById("loading")
.style.display = "block";

submitBtn.disabled = true;

const form = e.target;

const data = {

kodeKomunitas : kodeKomunitas,
namaKomunitas : komunitasData.namaKomunitas,
kategori : komunitasData.kategori,

namaLengkap : form.namaLengkap.value,
nik : form.nik.value,
namaBib : form.namaBib.value,
tanggalLahir : form.tanggalLahir.value,
jenisKelamin : form.jenisKelamin.value,
wa : form.wa.value,
email : form.email.value,
kota : form.kota.value,
jersey : form.jersey.value,
goldar : form.goldar.value,
riwayat : form.riwayat.value,
kontakDarurat : form.kontakDarurat.value

};

try{

const response =
await fetch(WEBAPP_URL,{

method : "POST",

headers : {
"Content-Type" : "text/plain;charset=utf-8"
},

body : JSON.stringify({
action : "registerAnggotaKomunitas",
...data
})

});

const res =
await response.json();

document.getElementById("loading")
.style.display = "none";

submitBtn.disabled = false;

if(res.status === "success"){

document.getElementById("successBox")
.style.display = "block";

document.getElementById("successText")
.innerHTML = `

<div style="
background:#0b1f3d;
padding:22px;
border-radius:18px;
">

🏃 REGISTRASI PESERTA DARI KOMUNITAS<br>
<b>${komunitasData.namaKomunitas}</b><br><br>

TELAH BERHASIL ✅<br><br>

🆔 Register ID :
<b>${res.registerId}</b><br><br>

Terimakasih sudah ikut meramaikan
<b>RUN FOR YOUR LIFE 2026</b>.<br><br>

Tunggu admin mengirimkan pesan
WhatsApp untuk validasi data peserta.<br><br>

🔥 Semangat dan tularkan semangat larimu
ke peserta non komunitas.

</div>

`;

form.reset();

window.scrollTo({

top : document.body.scrollHeight,
behavior : "smooth"

});

loadKomunitas();

}else{

alert(res.message);

}

}catch(err){

document.getElementById("loading")
.style.display = "none";

submitBtn.disabled = false;

alert(err.message);

console.log(err);

}

});

</script>

</body>
</html>
